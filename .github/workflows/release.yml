name: Build and publish SwarmWatch release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            os_name: macos
            arch_name: arm64
            rust_target: aarch64-apple-darwin
            platform_key: darwin-aarch64
          - runner: macos-15-intel
            os_name: macos
            arch_name: x64
            rust_target: x86_64-apple-darwin
            platform_key: darwin-x86_64
          - runner: ubuntu-24.04
            os_name: linux
            arch_name: x64
            rust_target: x86_64-unknown-linux-gnu
            platform_key: linux-x86_64
          - runner: windows-latest
            os_name: windows
            arch_name: x64
            rust_target: x86_64-pc-windows-msvc
            platform_key: windows-x86_64

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Build exactly what was tagged.
          ref: ${{ github.ref_name }}

      - name: Extract version from tag
        id: extract
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Bump version in config files (no commit; build-only)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.extract.outputs.version }}"

          # Update package.json
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json

          # Update src-tauri/tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

          # Update src-tauri/Cargo.toml
          # NOTE: macOS runners use BSD sed where `sed -i` requires a backup suffix.
          # Use perl for portability.
          perl -pi -e "s/^version\s*=\s*\".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Generate release body
        shell: bash
        run: |
          git log -1 --pretty=format:"%s%n%n%b" "${{ github.sha }}" > release_body.txt

      - name: Install Linux dependencies
        if: matrix.os_name == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install JS dependencies
        shell: bash
        run: npm ci

      - name: Build frontend
        shell: bash
        run: npm run build

      - name: Ensure Cargo.lock exists
        shell: bash
        run: |
          cd src-tauri
          cargo generate-lockfile

      - name: Build runner sidecar
        shell: bash
        run: |
          set -euo pipefail
          cargo build --manifest-path src-tauri/Cargo.toml \
            --release \
            --bin swarmwatch-runner \
            --target ${{ matrix.rust_target }}

          mkdir -p src-tauri/binaries

          # Tauri sidecar naming convention for externalBin templates:
          #   binaries/swarmwatch-runner-<target-triple>[.exe]
          if [ "${{ matrix.os_name }}" = "windows" ]; then
            cp "src-tauri/target/${{ matrix.rust_target }}/release/swarmwatch-runner.exe" \
              "src-tauri/binaries/swarmwatch-runner-${{ matrix.rust_target }}.exe"
          else
            cp "src-tauri/target/${{ matrix.rust_target }}/release/swarmwatch-runner" \
              "src-tauri/binaries/swarmwatch-runner-${{ matrix.rust_target }}"
            chmod +x "src-tauri/binaries/swarmwatch-runner-${{ matrix.rust_target }}" || true
          fi

      - name: Build Tauri app
        shell: bash
        env:
          # Needed because tauri.conf.json uses $env:SWARM_UPDATER_PUBKEY
          SWARM_UPDATER_PUBKEY: ${{ secrets.SWARM_UPDATER_PUBKEY }}
        run: |
          npx tauri build --target ${{ matrix.rust_target }}

      - name: Package release (macOS)
        if: matrix.os_name == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          # Publish updater-native artifact produced by `createUpdaterArtifacts`.
          # Expected output: SwarmWatch.app.tar.gz (+ .sig)
          BUNDLE_DIR="src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos"
          UPDATER_TGZ=$(find "$BUNDLE_DIR" -maxdepth 1 -name "*.app.tar.gz" | head -1)
          if [ -z "$UPDATER_TGZ" ]; then
            echo "No .app.tar.gz found in $BUNDLE_DIR" >&2
            ls -la "$BUNDLE_DIR" || true
            exit 1
          fi
          cp "$UPDATER_TGZ" "dist/swarmwatch-${{ matrix.os_name }}-${{ matrix.arch_name }}.app.tar.gz"

      - name: Package release (Linux)
        if: matrix.os_name == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          # Publish updater-native artifact: raw AppImage (+ .sig)
          BUNDLE_DIR="src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage"
          APPIMAGE=$(find "$BUNDLE_DIR" -maxdepth 1 -name "*.AppImage" | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found in $BUNDLE_DIR" >&2
            ls -la "$BUNDLE_DIR" || true
            exit 1
          fi
          cp "$APPIMAGE" "dist/swarmwatch-${{ matrix.os_name }}-${{ matrix.arch_name }}.AppImage"

      - name: Package release (Windows)
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          # IMPORTANT: Tauri updater on Windows expects an installer artifact (NSIS/MSI),
          # not a portable zip. If we publish only a zip, in-app update may download but
          # not actually install/replace the running app.
          #
          # So we publish the bundle installer produced by `tauri build`.
          $bundleRoot = "src-tauri/target/${{ matrix.rust_target }}/release/bundle"
          if (!(Test-Path $bundleRoot)) { throw "bundle output not found at $bundleRoot" }

          # Prefer MSI if present, otherwise fall back to NSIS setup exe.
          $msi = Get-ChildItem -Path $bundleRoot -Recurse -Filter "*.msi" | Select-Object -First 1
          if ($msi) {
            Copy-Item -Force -Path $msi.FullName -Destination "dist/swarmwatch-windows-x64.msi"
            Write-Host "Packaged MSI: $($msi.FullName)"
            exit 0
          }

          $nsis = Get-ChildItem -Path $bundleRoot -Recurse -Filter "*.exe" |
            Where-Object { $_.FullName -match "\\\\nsis\\\\" -and $_.Name -match "setup" } |
            Select-Object -First 1
          if (-not $nsis) { throw "No Windows installer found under $bundleRoot (expected NSIS setup exe or MSI)" }
          Copy-Item -Force -Path $nsis.FullName -Destination "dist/swarmwatch-windows-x64-setup.exe"
          Write-Host "Packaged NSIS: $($nsis.FullName)"

      - name: Sign release archive
        shell: bash
        env:
          SWARM_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.SWARM_TAURI_SIGNING_PRIVATE_KEY }}
          SWARM_TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.SWARM_TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          ARCHIVE=$(ls dist/swarmwatch-${{ matrix.os_name }}-${{ matrix.arch_name }}.*)
          npx tauri signer sign "$ARCHIVE" \
            --private-key "$SWARM_TAURI_SIGNING_PRIVATE_KEY" \
            --password "$SWARM_TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: swarmwatch-${{ matrix.os_name }}-${{ matrix.arch_name }}
          path: |
            dist/swarmwatch-${{ matrix.os_name }}-${{ matrix.arch_name }}.*

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          body_path: release_body.txt
          files: |
            dist/swarmwatch-${{ matrix.os_name }}-${{ matrix.arch_name }}.*

  publish-update-json:
    needs: [build-and-release]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate latest.json
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"

          PLATFORMS=""
          FIRST=true

          add_platform() {
            local key="$1"
            local file="$2"
            if [ -f "artifacts/${file}.sig" ]; then
              local sig
              sig=$(cat "artifacts/${file}.sig")
              [ "$FIRST" = false ] && PLATFORMS+="," || true
              PLATFORMS+="\n    \"${key}\": {"
              PLATFORMS+="\n      \"url\": \"https://github.com/SwarmPack/SwarmWatch/releases/download/${{ github.ref_name }}/${file}\","
              PLATFORMS+="\n      \"signature\": \"${sig}\""
              PLATFORMS+="\n    }"
              FIRST=false
            fi
          }

          add_platform "darwin-aarch64" "swarmwatch-macos-arm64.app.tar.gz"
          add_platform "darwin-x86_64" "swarmwatch-macos-x64.app.tar.gz"
          add_platform "linux-x86_64" "swarmwatch-linux-x64.AppImage"
          # Windows: prefer MSI, otherwise NSIS setup exe.
          if [ -f "artifacts/swarmwatch-windows-x64.msi.sig" ]; then
            add_platform "windows-x86_64" "swarmwatch-windows-x64.msi"
          else
            add_platform "windows-x86_64" "swarmwatch-windows-x64-setup.exe"
          fi

          # Hard fail if any platform is missing. Silent skipping makes updates look broken.
          missing=0
          for key in "darwin-aarch64" "darwin-x86_64" "linux-x86_64" "windows-x86_64"; do
            if ! echo "$PLATFORMS" | grep -q "\"$key\""; then
              echo "Missing platform entry in latest.json: $key" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Refusing to publish latest.json: missing platforms (see above)." >&2
            exit 1
          fi

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Release v${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {$(echo -e "$PLATFORMS")
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload latest.json to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json

      - name: Upload installer scripts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            scripts/install.sh
            scripts/install.ps1
